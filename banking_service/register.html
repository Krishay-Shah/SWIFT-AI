<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Swift Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/new-style.css">
    <style>
        body.login-page {
            background: linear-gradient(135deg, var(--bg-white) 0%, var(--bg-gray) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            overflow: hidden;
        }

        .dark-mode.login-page {
            background: linear-gradient(135deg, #0d1117 0%, #1a2e1f 100%);
        }
    </style>
</head>

<body class="login-page">

    <div class="card border-0 shadow-lg login-card">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <img src="images/logo.png" alt="Swift Bank Logo" class="brand-logo mb-3">
                <h3 class="fw-bold">Create Account</h3>
                <p class="text-muted small">Join the Fraud Detection Platform</p>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="mb-3">
                    <label class="form-label small fw-bold">FULL NAME</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" id="name" class="form-control bg-light border-0" placeholder="Name" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">EMAIL ADDRESS</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i
                                class="fas fa-envelope text-muted"></i></span>
                        <input type="email" id="email" class="form-control bg-light border-0"
                            placeholder="name@gmail.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">PHONE NUMBER </label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="fas fa-phone text-muted"></i></span>
                        <input type="tel" id="phone" class="form-control bg-light border-0"
                            placeholder="+91 98765 43210" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">ROLE</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i
                                class="fas fa-user-tag text-muted"></i></span>
                        <select id="role" class="form-select bg-light border-0" required>
                            <option value="">Select Your Role</option>
                            <option value="Customer">Bank Customer (Personal Banking)</option>
                            <option value="Merchant">Merchant (Business Account)</option>

                        </select>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" id="password" class="form-control bg-light border-0"
                            placeholder="Create a strong password" required>
                        <button class="btn btn-light border-0" type="button" onclick="togglePassword('password', this)">
                            <i class="fas fa-eye text-muted"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mb-3 shadow">Create Account</button>
            </form>

            <div class="text-center small text-muted">
                Already have an account? <a href="login.html" class="text-primary text-decoration-none fw-bold">Sign
                    In</a>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function handleRegister(e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;

            // 1. Validation Logic
            if (name.trim().length < 3) {
                alert('Please enter your full name (at least 3 characters).');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Please enter a valid email address.');
                return;
            }

            const phoneRegex = /^[+]?[(]?[0-9]{3}[)]?[-\s.]?[0-9]{3}[-\s.]?[0-9]{4,6}$/;
            if (!phoneRegex.test(phone.replace(/\s/g, ""))) {
                alert('Please enter a valid phone number.');
                return;
            }

            if (password.length < 8) {
                alert('Password must be at least 8 characters long.');
                return;
            }

            if (!role) {
                alert('Please select your role.');
                return;
            }

            // 2. Submit Logic
            const btn = document.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Creating Account...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, role, password })
                });
                const result = await response.json();

                if (result.success) {
                    alert('Registration successful! Welcome email sent.');
                    window.location.href = 'login.html';
                } else {
                    alert(result.message || 'Registration failed');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeIcon').className = 'fas fa-sun';
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
