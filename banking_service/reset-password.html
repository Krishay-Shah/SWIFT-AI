<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Swift Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/new-style.css">
    <style>
        body.login-page {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            overflow: hidden;
        }

        .dark-mode.login-page {
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
        }
    </style>
</head>

<body class="login-page">

    <div class="card border-0 shadow-lg login-card">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <img src="images/logo.png" alt="Swift Bank Logo" class="brand-logo mb-3">
                <h3 class="fw-bold">Reset Password</h3>
                <p class="text-muted small">Create a new secure password</p>
            </div>

            <form id="resetForm" onsubmit="handleReset(event)">
                <div class="mb-3">
                    <label class="form-label small fw-bold">NEW PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" id="password" class="form-control bg-light border-0"
                            placeholder="••••••••" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">CONFIRM PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" id="confirmPassword" class="form-control bg-light border-0"
                            placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mb-3 shadow">Reset Password</button>
            </form>

            <div class="text-center small text-muted">
                <a href="login.html" class="text-primary text-decoration-none fw-bold">Back to Login</a>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check for Token on Load
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            alert('Invalid reset link. Returning to login.');
            window.location.href = 'login.html';
        }

        async function handleReset(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            const btn = document.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Updating...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        password: password
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alert('Password reset successful! You can now login.');
                    window.location.href = 'login.html';
                } else {
                    alert(result.message || 'Failed to reset password');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Connection error. Please try again.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeIcon').className = 'fas fa-sun';
        }
    </script>
</body>

</html>
