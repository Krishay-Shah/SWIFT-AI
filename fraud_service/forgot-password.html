<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Fraud Detection System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .login-card {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: #3b82f6;
            letter-spacing: 0.5px;
        }

        .logo span {
            color: #fff;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #94a3b8;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background: #2563eb;
        }

        .link-text {
            display: block;
            text-align: center;
            color: #94a3b8;
            font-size: 0.875rem;
            text-decoration: none;
            margin-top: 1.5rem;
            transition: color 0.2s;
        }

        .link-text:hover {
            color: #3b82f6;
        }

        .msg-box {
            font-size: 0.875rem;
            text-align: center;
            margin-top: 1rem;
            display: none;
            padding: 0.75rem;
            border-radius: 8px;
        }

        .success-msg {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid #059669;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid #dc2626;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo">Swift AI <span>Fraud Guard</span></div>
        <p style="text-align: center; color: #94a3b8; margin-bottom: 2rem;">Enter your email to receive password reset
            instructions.</p>

        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
        </div>

        <button onclick="sendResetLink()" class="btn-login">Send Reset Link</button>

        <div id="msg" class="msg-box"></div>

        <a href="login.html" class="link-text">Return to Login</a>
    </div>

    <script>
        async function sendResetLink() {
            const email = document.getElementById('email').value;
            const msgDiv = document.getElementById('msg');
            const btn = document.querySelector('.btn-login');

            if (!email) {
                msgDiv.className = 'msg-box error-msg';
                msgDiv.style.display = 'block';
                msgDiv.textContent = 'Please enter your email address.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';
            msgDiv.style.display = 'none';

            // Simulate API call
            setTimeout(() => {
                msgDiv.className = 'msg-box success-msg';
                msgDiv.style.display = 'block';
                msgDiv.textContent = 'If an account exists, a reset link has been sent.';
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }, 1500);
        }
    </script>
</body>

</html>
