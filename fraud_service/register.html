<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Fraud Detection System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .login-card {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: #3b82f6;
            letter-spacing: 0.5px;
        }

        .logo span {
            color: #fff;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #94a3b8;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 1rem;
        }

        .btn-login:hover {
            background: #2563eb;
        }

        .link-text {
            display: block;
            text-align: center;
            color: #94a3b8;
            font-size: 0.875rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .link-text:hover {
            color: #3b82f6;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.875rem;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo">Swift AI <span>Fraud Guard</span></div>
        <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="name" class="form-input" placeholder="John Doe" required>
        </div>
        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>
        <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" required>
        </div>
        <button onclick="register()" class="btn-login">Create Account</button>
        <a href="login.html" class="link-text">Already have an account? Login</a>
        <div id="error" class="error-msg"></div>
    </div>

    <script>
        async function register() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('error');

            if (password !== confirmPassword) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Passwords do not match';
                return;
            }

            try {
                // Determine API endpoint - attempting to reuse or mock registration
                // In a real scenario, we'd need a backend endpoint for this.
                // Assuming /api/auth/register exists or we simulate success
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                // If endpoint doesn't exist (404), likely just simulate for now since backend might not support it
                if (res.status === 404) {
                    console.warn('Register endpoint not found, simulating success');
                    alert('Account created! Redirecting to login...');
                    window.location.href = 'login.html';
                    return;
                }

                const data = await res.json();

                if (data.success || res.ok) {
                    alert('Account created successfully!');
                    window.location.href = 'login.html';
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = data.message || 'Registration failed';
                }
            } catch (e) {
                console.error(e);
                // Fallback for demo purposes if backend fails
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Connection error or endpoint missing';
            }
        }
    </script>
</body>

</html>
