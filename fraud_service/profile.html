<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyst Profile - Swift AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/new-style.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <i class="fas fa-shield-alt text-primary me-2"></i>Swift AI | Fraud Engine
            </a>
            <div class="d-flex align-items-center">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left me-2"></i>Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 py-4 text-center">
                        <img id="profileAvatar" src="https://ui-avatars.com/api/?name=Admin&background=dc3545&color=fff" class="rounded-circle mb-3 border border-3 border-white shadow" width="100" height="100">
                        <h4 class="fw-bold mb-1" id="profileNameDisplay">Loading...</h4>
                        <span class="badge bg-primary" id="profileRoleBadge">Analyst</span>
                    </div>
                    <div class="card-body p-5">
                        <form id="profileForm">
                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Full Name</label>
                                    <input type="text" class="form-control" id="profileName" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Email Address</label>
                                    <input type="email" class="form-control bg-light" id="profileEmail" readonly>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Phone Number</label>
                                    <input type="tel" class="form-control" id="profilePhone" placeholder="+1 (555) ...">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Role / Access Level</label>
                                    <input type="text" class="form-control bg-light" id="profileRole" readonly>
                                </div>
                            </div>
                            
                            <hr class="my-4">
                            <div class="d-flex justify-content-between">
                                <button type="button" class="btn btn-outline-danger" onclick="logout()">
                                    <i class="fas fa-sign-out-alt me-2"></i>Log Out
                                </button>
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="fas fa-save me-2"></i>Save Changes
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadProfile() {
            try {
                const res = await fetch('/api/auth/profile');
                if (res.status === 401) window.location.href = 'login.html';
                const data = await res.json();
                
                document.getElementById('profileNameDisplay').innerText = data.name;
                document.getElementById('profileName').value = data.name;
                document.getElementById('profileEmail').value = data.email;
                document.getElementById('profileRole').value = data.role;
                document.getElementById('profileRoleBadge').innerText = data.role;
                if(data.avatar) document.getElementById('profileAvatar').src = data.avatar;
                if(data.phone) document.getElementById('profilePhone').value = data.phone;
            } catch (e) {
                console.error("Error loading profile:", e);
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Saving...';
            btn.disabled = true;

            const name = document.getElementById('profileName').value;
            const phone = document.getElementById('profilePhone').value;

            try {
                const res = await fetch('/api/auth/profile/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone })
                });
                
                if (res.ok) {
                    alert('Profile updated successfully!');
                    loadProfile();
                } else {
                    alert('Failed to update profile.');
                }
            } catch (e) {
                console.error("Failed to update profile:", e);
            } finally {
                btn.innerHTML = '<i class="fas fa-save me-2"></i>Save Changes';
                btn.disabled = false;
            }
        });

        function logout() {
            fetch('/api/auth/logout', {method: 'POST'})
                .then(() => window.location.href = 'login.html')
                .catch(() => window.location.href = 'login.html');
        }

        loadProfile();
    </script>
</body>
</html>
